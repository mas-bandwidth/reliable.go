name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: false # no dependencies, so there is no go.sum to key the cache on
      - name: Check formatting
        run: |
          unformatted=$(gofmt -s -l .)
          if [ -n "$unformatted" ]; then
            echo "these files need gofmt -s:"
            echo "$unformatted"
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...
      - name: Vulnerability check
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  # every test job already verifies the Go port against the committed golden
  # transcript (TestWireCompatibility). this job closes the loop by rebuilding
  # the golden from the pinned C sources, so the golden itself cannot drift.
  wire-compatibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Regenerate golden transcript from the C library
        run: ./interop/regenerate.sh /tmp/regenerated.gz
      - name: Verify committed golden matches the C library
        run: cmp <(gunzip -c /tmp/regenerated.gz) <(gunzip -c testdata/c_transcript.txt.gz)

  test:
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        go: [ '1.22', 'stable' ] # oldest supported and latest
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash # consistent quoting across platforms (pwsh splits -coverprofile=coverage.out at the dot)
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: false
      - name: Build
        run: go build ./...
      - name: Test
        run: go test -race -coverprofile=coverage.out ./...
      - name: Coverage
        run: go tool cover -func=coverage.out | tail -n 1
      - name: Fuzz
        run: go test -fuzz=FuzzReceivePacket -fuzztime=30s .
      - name: Soak
        run: go run ./cmd/soak --quiet 10000

  spec-sync:
    name: STANDARD.md matches upstream
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # STANDARD.md here is a VERBATIM VENDORED COPY of the wire-format
      # specification that lives in mas-bandwidth/reliable. This job fails if the
      # two have diverged.
      #
      # Why vendor rather than link: an implementer wants the normative text
      # beside the implementation, at the revision they are reading. Why check:
      # a duplicated normative document is the same failure as a duplicated
      # constant, except it drifts silently and the ports are what break.
      #
      # If this fails, the upstream spec changed. Read the diff, port whatever
      # it implies, then copy the new file across in the same commit.
      - name: Compare against mas-bandwidth/reliable
        run: |
          curl -fsSL -o /tmp/upstream-STANDARD.md \
            https://raw.githubusercontent.com/mas-bandwidth/reliable/main/STANDARD.md
          if ! diff -u /tmp/upstream-STANDARD.md STANDARD.md; then
            echo "::error::STANDARD.md has diverged from mas-bandwidth/reliable"
            exit 1
          fi
          echo "STANDARD.md matches upstream"
